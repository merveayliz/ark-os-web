<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ARK-OS | Earth 2.0</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/icon.jpg">
</head>
<body>
    <div id="yildizlar"></div>

    <div id="ana-konteynir" class="merkez">
        <div id="ust-bolum">
            <h1 id="site-adi">ARK-OS</h1>
            <div class="dunya"></div>
        </div>
        
        <h2 id="mesaj">May We Meet Again...</h2>
<div id="form-alani">
    <div id="giris-formu">
        <h2 class="acilis-mesaji">Sisteme Eriş</h2>
        <input type="text" id="login-ad" placeholder="Kullanıcı Adı">
        <input type="password" id="login-sifre" placeholder="Erişim Şifresi">
        <button onclick="sistemeGir()" class="inis-btn">GİRİŞ YAP</button>
        <p class="inis-yazisi" onclick="formDegistir()" style="cursor:pointer">Hesabın yok mu? Kayıt Ol</p>
    </div>

    <div id="kayit-formu" class="gizli">
        <h2 class="acilis-mesaji">Yeni Kayıt</h2>
        <input type="text" id="kayit-ad" placeholder="Adını Belirle">
        <input type="password" id="kayit-sifre" placeholder="Güçlü Bir Şifre Seç">
        <button onclick="kayitOl()" class="inis-btn">KAYDI TAMAMLA</button>
        <p class="inis-yazisi" onclick="formDegistir()" style="cursor:pointer">Zaten üye misin? Giriş Yap</p>
    </div>
</div>

    <script src="js/script.js"></script>

</html>
